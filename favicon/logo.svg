<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#B8963E"/>
      <stop offset="45%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>

  <!--
    Open circle: starts at ~20° and ends at ~340°, leaving a small gap at top-right.
    radius = 82, centre = 100,100
    Start  (20°):  x = 100 + 82·cos(20°) = 177.1,  y = 100 - 82·sin(20°) = 71.9
    End   (340°):  x = 100 + 82·cos(-20°)= 177.1,  y = 100 + 82·sin(20°) = 128.1
    large-arc-flag = 1 (go the long way around)
  -->
  <path
    d="M 177.1 71.9 A 82 82 0 1 0 177.1 128.1"
    stroke="url(#gold-grad)"
    stroke-width="1.4"
    stroke-linecap="round"
    fill="none"
  />

  <!--
    Letter R — thin serif construction
    Stem:       x=62, y=55..145
    Top serif:  short horizontal lines at top of stem
    Bowl:       bezier curve forming the upper half
    Leg:        diagonal from bowl bottom-right downward
  -->
  <!-- Stem -->
  <line x1="62" y1="55" x2="62" y2="145" stroke="url(#gold-grad)" stroke-width="2.2" stroke-linecap="butt"/>
  <!-- Top serif -->
  <line x1="56" y1="55" x2="68" y2="55" stroke="url(#gold-grad)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Bottom serif -->
  <line x1="56" y1="145" x2="68" y2="145" stroke="url(#gold-grad)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Bowl (R arch) -->
  <path d="M 62 55 Q 100 55 100 83 Q 100 108 62 108" stroke="url(#gold-grad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Leg -->
  <line x1="88" y1="108" x2="118" y2="145" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round"/>

  <!--
    Letter K — thin construction, sharing vertical space
    Stem:   x=108, y=70..145
    Arm:    from (108,108) up-right to (138,70)
    Leg:    from (108,108) down-right to (138,145)
    Small serif at top and bottom of stem
  -->
  <!-- Stem -->
  <line x1="108" y1="70" x2="108" y2="145" stroke="url(#gold-grad)" stroke-width="2.2" stroke-linecap="butt"/>
  <!-- Top serif -->
  <line x1="102" y1="70" x2="114" y2="70" stroke="url(#gold-grad)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Arm (upper diagonal) -->
  <line x1="108" y1="108" x2="138" y2="70" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Leg (lower diagonal) -->
  <line x1="108" y1="108" x2="138" y2="145" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom serif on leg -->
  <line x1="132" y1="145" x2="144" y2="145" stroke="url(#gold-grad)" stroke-width="1.4" stroke-linecap="round"/>
</svg>
